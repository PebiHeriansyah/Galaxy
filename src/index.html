<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Galaxy</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<style>
			body {
				margin: 0px;
				overflow: hidden;
				background: #000000;
			}
			canvas.webgl {
				display: block;
			}
			
			/* Info overlay */
			.info {
				position: fixed;
				bottom: 20px;
				left: 20px;

				font-size: 12px;
				pointer-events: none;
				text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
			}
		</style>
	</head>
	<body>
		<canvas class="webgl"></canvas>
		<div class="info">
			Ultra-Realistic Galaxy Simulation<br>
			355,000+ particles | Astronomical rendering
